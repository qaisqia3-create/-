<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>NEXUS FIT | onboarding pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0a0a, #010101);
            font-family: 'Tajawal', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: #eef2ff;
            padding: 1rem;
            min-height: 100vh;
        }

        /* main container */
        .form-container {
            max-width: 680px;
            margin: 1rem auto 2.5rem auto;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(220, 38, 38, 0.2);
            overflow: hidden;
            padding: 1.5rem 1.2rem 2rem;
            transition: all 0.2s;
        }

        /* progress bar area */
        .progress-area {
            margin-bottom: 1.8rem;
        }
        .step-counter {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 0.5rem;
        }
        .progress-bar-bg {
            background-color: #2a2a2f;
            border-radius: 40px;
            height: 8px;
            width: 100%;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #e11d48, #dc2626);
            width: 0%;
            height: 100%;
            border-radius: 40px;
            transition: width 0.3s ease;
            box-shadow: 0 0 6px #ef4444;
        }

        /* motivational badge */
        .motivation-chip {
            background: rgba(220, 38, 38, 0.12);
            border-right: 4px solid #dc2626;
            padding: 0.7rem 1rem;
            border-radius: 1.2rem;
            margin: 1.2rem 0 1.5rem 0;
            font-size: 0.9rem;
            font-weight: 500;
            color: #facc15;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .motivation-chip span:first-child {
            font-size: 1.4rem;
        }

        /* steps wrapper */
        .steps-wrapper {
            position: relative;
        }
        .step {
            display: none;
            animation: fadeSlide 0.25s ease-out;
        }
        .step.active-step {
            display: block;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateX(12px);}
            to { opacity: 1; transform: translateX(0);}
        }

        /* form elements */
        .input-group {
            margin-bottom: 1.3rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
            color: #ddd;
        }
        label .req {
            color: #f87171;
            margin-right: 4px;
        }
        input, select, textarea {
            width: 100%;
            background: #121217;
            border: 1px solid #2c2c34;
            padding: 0.85rem 1rem;
            border-radius: 1.2rem;
            font-size: 0.95rem;
            font-family: inherit;
            color: #f0f0f0;
            transition: all 0.2s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.3);
            background: #18181f;
        }
        .radio-group {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .radio-group label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            margin-bottom: 0;
            cursor: pointer;
        }
        .radio-group input {
            width: 18px;
            height: 18px;
            accent-color: #dc2626;
        }
        .inline-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .inline-row .input-group {
            flex: 1;
        }
        hr {
            margin: 1rem 0;
            border-color: #2c2c34;
        }
        textarea {
            resize: vertical;
            min-height: 75px;
        }

        /* button group */
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }
        button {
            background: #1f1f2b;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(95deg, #b91c1c, #dc2626);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }
        .btn-primary:hover {
            background: linear-gradient(95deg, #991b1b, #b91c1c);
            transform: scale(0.98);
        }
        .btn-secondary {
            background: #2a2a33;
            border: 1px solid #3f3f4a;
        }
        .btn-secondary:hover {
            background: #3a3a44;
        }
        .error-msg {
            color: #f87171;
            font-size: 0.75rem;
            margin-top: 0.3rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .final-send {
            width: 100%;
            justify-content: center;
            font-size: 1.1rem;
            padding: 1rem;
        }
        .small-note {
            font-size: 0.7rem;
            color: #999;
            text-align: center;
            margin-top: 1rem;
        }

        @media (max-width: 550px) {
            .form-container {
                padding: 1rem;
            }
            .inline-row {
                flex-direction: column;
                gap: 0;
            }
            button {
                padding: 0.7rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="progress-area">
        <div class="step-counter">
            <span>📋 الخطوة <span id="currentStepNum">1</span> / <span id="totalSteps">8</span></span>
            <span id="stepNameDisplay">المعلومات الشخصية</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div class="motivation-chip" id="motivationMsg">
        <span>🔥</span>
        <span id="dynamicMotivation">الخطوة الأولى نحو أقوى نسخة منك 👑</span>
    </div>

    <div class="steps-wrapper" id="stepsWrapper">
        <!-- STEP 1: المعلومات الشخصية -->
        <div class="step" data-step="1">
            <h3 style="margin-bottom: 1rem;">👤 بياناتك الأساسية</h3>
            <div class="input-group"><label>الاسم الكامل <span class="req">*</span></label><input type="text" id="fullName" placeholder="مثال: أحمد خالد"></div>
            <div class="inline-row">
                <div class="input-group"><label>العمر <span class="req">*</span></label><input type="number" id="age" placeholder="بالسنوات"></div>
                <div class="input-group"><label>الطول (سم) <span class="req">*</span></label><input type="number" id="height" placeholder="سم"></div>
                <div class="input-group"><label>الوزن (كجم) <span class="req">*</span></label><input type="number" id="weight" placeholder="كجم"></div>
            </div>
            <div class="inline-row">
                <div class="input-group"><label>الجنس <span class="req">*</span></label><select id="gender"><option value="">اختر</option><option value="ذكر">ذكر</option><option value="أنثى">أنثى</option></select></div>
                <div class="input-group"><label>رقم الهاتف <span class="req">*</span></label><input type="tel" id="phone" placeholder="+9665xxxxxxxx"></div>
            </div>
        </div>

        <!-- STEP 2: الهدف -->
        <div class="step" data-step="2">
            <h3>🎯 تحديد الهدف الرياضي</h3>
            <div class="input-group"><label>الهدف الرئيسي <span class="req">*</span></label><select id="mainGoal"><option value="">اختر</option><option value="تضخيم (ضخامة عضلية)">تضخيم 💪</option><option value="تنشيف (حرق دهون)">تنشيف 🔥</option><option value="لياقة عامة">لياقة عامة 🧘</option></select></div>
            <div class="input-group"><label>الهدف بالتفصيل <span class="req">*</span></label><textarea id="goalDetails" rows="2" placeholder="مثال: أريد زيادة الكتلة العضلية 10 كجم خلال 6 أشهر"></textarea></div>
            <div class="input-group"><label>المدة الزمنية المستهدفة <span class="req">*</span></label><input type="text" id="duration" placeholder="مثال: 3 أشهر / 12 أسبوع"></div>
        </div>

        <!-- STEP 3: التاريخ الرياضي -->
        <div class="step" data-step="3">
            <h3>🏋️ التاريخ الرياضي</h3>
            <div class="input-group"><label>هل سبق لك التمرين؟ <span class="req">*</span></label><div class="radio-group"><label><input type="radio" name="prevExp" value="نعم"> نعم</label><label><input type="radio" name="prevExp" value="لا"> لا</label></div></div>
            <div id="expFields" style="transition:0.2s">
                <div class="input-group"><label>سنوات الخبرة</label><input type="text" id="expYears" placeholder="مثال: سنتان"></div>
                <div class="input-group"><label>نوع التمارين السابقة</label><input type="text" id="exerciseType" placeholder="مثلاً: حديد / كارديو / كالستنيكس"></div>
            </div>
        </div>

        <!-- STEP 4: الحالة الصحية -->
        <div class="step" data-step="4">
            <h3>❤️ الحالة الصحية</h3>
            <div class="input-group"><label>إصابات حالية أو سابقة</label><textarea id="injuries" rows="2" placeholder="مثلاً: التواء كاحل، تمزق في الكتف"></textarea></div>
            <div class="input-group"><label>أمراض مزمنة (ضغط، سكري، غدة..)</label><textarea id="illnesses" rows="2" placeholder="اذكر إن وُجدت"></textarea></div>
            <div class="input-group"><label>أدوية منتظمة</label><textarea id="medications" rows="2" placeholder="اسم الدواء والجرعة"></textarea></div>
        </div>

        <!-- STEP 5: نمط الحياة -->
        <div class="step" data-step="5">
            <h3>🛌 نمط الحياة</h3>
            <div class="input-group"><label>عدد ساعات النوم (المتوسط)</label><input type="text" id="sleep" placeholder="مثال: 6-7 ساعات"></div>
            <div class="input-group"><label>النشاط اليومي (غير رياضي)</label><select id="dailyActivity"><option value="">اختر</option><option value="خامل (جلوس طويل)">خامل (جلوس طويل)</option><option value="نشاط خفيف (مشي قليل)">نشاط خفيف</option><option value="نشاط متوسط (حركة دائمة)">نشاط متوسط</option><option value="نشاط عالي (وظيفة حركية)">نشاط عالي</option></select></div>
            <div class="input-group"><label>نوع العمل</label><input type="text" id="workType" placeholder="مكتبي / يدوي / ميداني"></div>
        </div>

        <!-- STEP 6: التغذية -->
        <div class="step" data-step="6">
            <h3>🍽️ التغذية والمكملات</h3>
            <div class="input-group"><label>عدد الوجبات الرئيسية يومياً</label><input type="text" id="meals" placeholder="مثال: 3-4 وجبات"></div>
            <div class="input-group"><label>النظام الغذائي الحالي</label><input type="text" id="diet" placeholder="مثلاً: عادي / صحي / كيتو / نباتي"></div>
            <div class="input-group"><label>المكملات الغذائية (إن وُجدت)</label><input type="text" id="supplements" placeholder="مثال: بروتين، كرياتين، فيتامينات"></div>
        </div>

        <!-- STEP 7: الالتزام -->
        <div class="step" data-step="7">
            <h3>⏱️ الالتزام والجدول</h3>
            <div class="input-group"><label>عدد أيام التمرين في الأسبوع</label><select id="daysPerWeek"><option value="">اختر</option><option value="يوم واحد">يوم واحد</option><option value="يومين">يومين</option><option value="3 أيام">3 أيام</option><option value="4 أيام">4 أيام</option><option value="5 أيام">5 أيام</option><option value="6 أيام">6 أيام</option></select></div>
            <div class="input-group"><label>الوقت المفضل للتمرين</label><input type="text" id="trainingTime" placeholder="مثال: الصباح الباكر / المساء بعد المغرب"></div>
        </div>

        <!-- STEP 8: الأسئلة التحفيزية + الإرسال -->
        <div class="step" data-step="8">
            <h3>💥 الدافع الحقيقي</h3>
            <div class="input-group"><label>لماذا تريد الوصول لهذا الهدف؟ <span class="req">*</span></label><textarea id="whyGoal" rows="3" placeholder="اكتب سببك القوي ..."></textarea></div>
            <div class="input-group"><label>أكبر تحدٍ يواجهك حالياً</label><textarea id="challenge" rows="2" placeholder="مثلاً: الالتزام، الوقت، الشهية، الإصابات السابقة"></textarea></div>
            <button class="btn-primary final-send" id="sendWhatsAppBtn">🚀 ابدأ رحلتك الآن 🚀</button>
            <div class="small-note">بمجرد الضغط، ستُرسل المعلومات عبر واتساب للمدرب مباشرة</div>
        </div>
    </div>

    <div class="buttons" id="navButtons">
        <button class="btn-secondary" id="prevBtn" style="visibility: hidden;">◀ السابق</button>
        <button class="btn-primary" id="nextBtn">التالي ▶</button>
    </div>
</div>

<script>
    // ----------------------- CONFIGURATION ------------------------
    // ⚡ ضع رقم الواتساب الخاص بالمدرب مع رمز الدولة (بدون + أو صفر زائد)
    const COACH_PHONE = "+9647714189224";   // مثال: رقم سعودي، غيّره لرقم المدرب الفعلي
    
    // ----------------------- DOM Elements -------------------------
    let currentStep = 1;
    const totalSteps = 8;
    const stepElements = document.querySelectorAll('.step');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const progressFill = document.getElementById('progressFill');
    const currentStepNumSpan = document.getElementById('currentStepNum');
    const stepNameDisplay = document.getElementById('stepNameDisplay');
    const dynamicMotivationSpan = document.getElementById('dynamicMotivation');
    
    // motivational messages between sections (arabic / inspiring)
    const motivationMessages = {
        1: "🔥 الاستعداد الحقيقي يبدأ بمعرفة نفسك. لنبدأ ببياناتك!",
        2: "🎯 الهدف الواضح = نتيجة مضمونة. حدد هدفك بدقة.",
        3: "💪 كل بطل له قصة، أخبرنا عن تاريخك الرياضي.",
        4: "❤️ صحتك هي أولويتنا، كن صادقاً مع حالتك الصحية.",
        5: "🛌 العادات اليومية تصنع الفارق! نمط حياتك مهم جداً.",
        6: "🍗 الغذاء أساس النجاح. أخبرنا عن تغذيتك الحالية.",
        7: "⏳ الالتزام هو مفتاح التحول، حدد جدولك الأنسب.",
        8: "🧠 العقلية هي السلاح السري. شاركنا دوافعك الحقيقية!"
    };
    
    const stepNames = {
        1: "المعلومات الشخصية",
        2: "الهدف الرياضي",
        3: "التاريخ الرياضي",
        4: "الحالة الصحية",
        5: "نمط الحياة",
        6: "التغذية",
        7: "الالتزام",
        8: "الدافع والإرسال"
    };
    
    function updateProgressAndUI() {
        const percent = ((currentStep) / totalSteps) * 100;
        progressFill.style.width = `${percent}%`;
        currentStepNumSpan.innerText = currentStep;
        stepNameDisplay.innerText = stepNames[currentStep];
        dynamicMotivationSpan.innerText = motivationMessages[currentStep] || "استمر أنت قريب من هدفك 💥";
        // toggle step visibility
        stepElements.forEach((step, idx) => {
            if (idx + 1 === currentStep) step.classList.add('active-step');
            else step.classList.remove('active-step');
        });
        // prev/next visibility
        prevBtn.style.visibility = currentStep === 1 ? "hidden" : "visible";
        if (currentStep === totalSteps) {
            nextBtn.style.display = "none";
            prevBtn.style.marginLeft = "auto";
            prevBtn.style.marginRight = "auto";
        } else {
            nextBtn.style.display = "inline-flex";
            prevBtn.style.marginLeft = "0";
            prevBtn.style.marginRight = "0";
        }
    }
    
    // Helper: validate current step fields (required)
    function validateCurrentStep() {
        let isValid = true;
        // remove previous inline errors
        document.querySelectorAll('.error-msg').forEach(el => el.remove());
        
        if (currentStep === 1) {
            const name = document.getElementById('fullName').value.trim();
            const age = document.getElementById('age').value.trim();
            const height = document.getElementById('height').value.trim();
            const weight = document.getElementById('weight').value.trim();
            const gender = document.getElementById('gender').value;
            const phone = document.getElementById('phone').value.trim();
            if (!name) showFieldError('fullName', 'الاسم مطلوب');
            else if (!age) showFieldError('age', 'العمر مطلوب');
            else if (!height) showFieldError('height', 'الطول مطلوب');
            else if (!weight) showFieldError('weight', 'الوزن مطلوب');
            else if (!gender) showFieldError('gender', 'اختر الجنس');
            else if (!phone) showFieldError('phone', 'رقم الهاتف مطلوب');
            else isValid = true;
            if (!name || !age || !height || !weight || !gender || !phone) isValid = false;
        }
        else if (currentStep === 2) {
            const mainGoal = document.getElementById('mainGoal').value;
            const goalDetails = document.getElementById('goalDetails').value.trim();
            const duration = document.getElementById('duration').value.trim();
            if (!mainGoal) showFieldError('mainGoal', 'اختر الهدف الرئيسي');
            else if (!goalDetails) showFieldError('goalDetails', 'أدخل تفاصيل الهدف');
            else if (!duration) showFieldError('duration', 'المدة الزمنية مطلوبة');
            else isValid = true;
            if (!mainGoal || !goalDetails || !duration) isValid = false;
        }
        else if (currentStep === 3) {
            const prevExpRadios = document.querySelectorAll('input[name="prevExp"]');
            let expSelected = false;
            for (let r of prevExpRadios) if (r.checked) expSelected = true;
            if (!expSelected) {
                showFieldError('expFields', 'اختر إذا كنت تمارس الرياضة سابقاً');
                isValid = false;
            } else isValid = true;
        }
        else if (currentStep === 8) {
            const whyGoal = document.getElementById('whyGoal').value.trim();
            if (!whyGoal) {
                showFieldError('whyGoal', 'الدافع هو محور رحلتك، الرجاء كتابته');
                isValid = false;
            } else isValid = true;
        }
        else {
            isValid = true; // steps 4,5,6,7 are not strictly required but all optional
        }
        return isValid;
    }
    
    function showFieldError(fieldIdOrQuery, message) {
        let element = document.getElementById(fieldIdOrQuery);
        if (!element && fieldIdOrQuery === 'expFields') {
            element = document.getElementById('expFields');
        }
        if (element) {
            const errDiv = document.createElement('div');
            errDiv.className = 'error-msg';
            errDiv.innerHTML = `⚠️ ${message}`;
            element.parentNode.insertBefore(errDiv, element.nextSibling);
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
            alert(message);
        }
    }
    
    function nextStep() {
        if (validateCurrentStep()) {
            if (currentStep < totalSteps) {
                currentStep++;
                updateProgressAndUI();
            }
        }
    }
    
    function prevStep() {
        if (currentStep > 1) {
            currentStep--;
            updateProgressAndUI();
        }
    }
    
    // ---------- dynamic fields for sports history (show/hide years if "no" selected) ----------
    function handleExpVisibility() {
        const selectedRadio = document.querySelector('input[name="prevExp"]:checked');
        const expFieldsDiv = document.getElementById('expFields');
        if (selectedRadio && selectedRadio.value === 'لا') {
            expFieldsDiv.style.opacity = '0.5';
            // we don't disable to keep values but visual cue
            document.getElementById('expYears').placeholder = "لا توجد خبرة سابقة";
            document.getElementById('exerciseType').placeholder = "لا يوجد";
        } else if (selectedRadio && selectedRadio.value === 'نعم') {
            expFieldsDiv.style.opacity = '1';
            document.getElementById('expYears').placeholder = "مثال: سنتان";
            document.getElementById('exerciseType').placeholder = "مثلاً: حديد / كارديو";
        }
    }
    
    // attach listeners to radio group in step 3
    function bindSportsRadio() {
        const radios = document.querySelectorAll('input[name="prevExp"]');
        radios.forEach(radio => radio.addEventListener('change', handleExpVisibility));
        handleExpVisibility();
    }
    
    // ---------- Build final WhatsApp message with structured text ----------
    function buildWhatsAppMessage() {
        // gather all fields
        const fullName = document.getElementById('fullName').value.trim() || "غير مدخل";
        const height = document.getElementById('height').value.trim() || "?";
        const weight = document.getElementById('weight').value.trim() || "?";
        const mainGoalSelect = document.getElementById('mainGoal').value;
        const goalDetailsText = document.getElementById('goalDetails').value.trim() || "غير محدد";
        const duration = document.getElementById('duration').value.trim() || "غير محدد";
        
        // sports history
        let prevExpValue = "لا";
        const checkedRadio = document.querySelector('input[name="prevExp"]:checked');
        if (checkedRadio) prevExpValue = checkedRadio.value;
        let expYearsVal = document.getElementById('expYears').value.trim();
        let exerciseTypeVal = document.getElementById('exerciseType').value.trim();
        if (prevExpValue === "لا") {
            expYearsVal = "لا توجد خبرة";
            exerciseTypeVal = "لا يوجد";
        } else {
            if (expYearsVal === "") expYearsVal = "غير مدخل";
            if (exerciseTypeVal === "") exerciseTypeVal = "غير مدخل";
        }
        const experienceStr = `${prevExpValue === "نعم" ? "سبق التمرين" : "بدون خبرة سابقة"} | سنوات: ${expYearsVal} | نوع: ${exerciseTypeVal}`;
        
        // health
        const injuries = document.getElementById('injuries').value.trim() || "لا يوجد";
        const illnesses = document.getElementById('illnesses').value.trim() || "لا يوجد";

        // nutrition
        const meals = document.getElementById('meals').value.trim() || "غير محدد";

        const supplements = document.getElementById('supplements').value.trim() || "لا يوجد";
        const nutritionStr = `وجبات: ${meals} | نظام: ${diet} | مكملات: ${supplements}`;
        
        // lifestyle
        const sleep = document.getElementById('sleep').value.trim() || "غير محدد";
        const dailyActivity = document.getElementById('dailyActivity').value || "غير محدد";
        const workType = document.getElementById('workType').value.trim() || "غير محدد";
        const lifestyleStr = `نوم: ${sleep} | نشاط يومي: ${dailyActivity} | العمل: ${workType}`;
        
        // commitment
        const daysPerWeek = document.getElementById('daysPerWeek').value || "غير محدد";
        const trainingTime = document.getElementById('trainingTime').value.trim() || "غير محدد";
        const commitmentStr = `${daysPerWeek} - وقت التمرين: ${trainingTime}`;
        
        // motivational
        const whyGoal = document.getElementById('whyGoal').value.trim() || "لم يحدد";
        const challenge = document.getElementById('challenge').value.trim() || "لم يحدد";
        
        // personal extras
        const age = document.getElementById('age').value.trim() || "?";
        const gender = document.getElementById('gender').value || "?";
        const phone = document.getElementById('phone').value.trim() || "?";
        
        // goal line combine main goal + details
        const goalCombined = mainGoalSelect ? `${mainGoalSelect} - ${goalDetailsText}` : `الهدف: ${goalDetailsText}`;
        
        // FINAL MESSAGE (exactly template + extra info for commitment & contact)
        let finalMsg = `🔥 متدرب جديد:

👤 الاسم: ${fullName}

⚖️ الوزن: ${weight} كجم

❤️ الحالة الصحية: ${healthStr}
🍽️ التغذية: ${nutritionStr}
🛌 النوم: ${lifestyleStr}

🔥 الهدف الحقيقي:
${whyGoal}

⚠️ التحديات:
${challenge}

📞 للتواصل: ${phone} | العمر: ${age} | الجنس: ${gender}
⏱️ الالتزام: ${commitmentStr}`;
        
        return finalMsg;
    }
    
    // send WhatsApp
    function sendToWhatsApp() {
        // Additional check for required fields across all steps (ensure no empty critical)
        const requiredChecks = [
            { id: 'fullName', msg: 'الاسم الكامل' },
            { id: 'age', msg: 'العمر' },
            { id: 'height', msg: 'الطول' },
            { id: 'weight', msg: 'الوزن' },
            { id: 'gender', msg: 'الجنس' },
            { id: 'phone', msg: 'رقم الهاتف' },
            { id: 'mainGoal', msg: 'الهدف الرئيسي' },
            { id: 'goalDetails', msg: 'تفاصيل الهدف' },
            { id: 'duration', msg: 'المدة الزمنية' }
        ];
        let missing = [];
        for (let req of requiredChecks) {
            const el = document.getElementById(req.id);
            if (!el || !el.value.trim()) missing.push(req.msg);
        }
        const whyGoalEl = document.getElementById('whyGoal');
        if (!whyGoalEl.value.trim()) missing.push('الدافع (لماذا الهدف)');
        
        if (missing.length > 0) {
            alert(`⚠️ الرجاء إكمال المعلومات التالية قبل الإرسال:\n${missing.join('\n')}\n\nاذهب للخطوات المطلوبة.`);
            // navigate to step 1 if personal missing
            if (missing.includes('الاسم الكامل') || missing.includes('العمر') || missing.includes('الطول') || missing.includes('الوزن') || missing.includes('الجنس') || missing.includes('رقم الهاتف')) {
                currentStep = 1;
                updateProgressAndUI();
            } else if (missing.includes('الهدف الرئيسي') || missing.includes('تفاصيل الهدف') || missing.includes('المدة الزمنية')) {
                currentStep = 2;
                updateProgressAndUI();
            } else if (missing.includes('الدافع (لماذا الهدف)')) {
                currentStep = 8;
                updateProgressAndUI();
            }
            return;
        }
        
        const messageText = buildWhatsAppMessage();
        const encodedText = encodeURIComponent(messageText);
        const whatsappURL = `https://wa.me/${COACH_PHONE}?text=${encodedText}`;
        window.open(whatsappURL, '_blank');
    }
    
    // ---------- Event listeners & init ----------
    function bindEvents() {
        nextBtn.addEventListener('click', nextStep);
        prevBtn.addEventListener('click', prevStep);
        const sendBtn = document.getElementById('sendWhatsAppBtn');
        if (sendBtn) sendBtn.addEventListener('click', sendToWhatsApp);
        // live radio for step3
        bindSportsRadio();
        // extra listener for dynamic change after step change (when coming back)
        document.querySelectorAll('input[name="prevExp"]').forEach(r => r.addEventListener('change', handleExpVisibility));
    }
    
    // initial load
    updateProgressAndUI();
    bindEvents();
    // ensure any previous filled fields in exp are correct
    handleExpVisibility();
    
    // small fix: if user changes radio in step3 later, keep working
    window.addEventListener('load', () => {
        // prefill none
    });
</script>
